# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

hugoblox:
  schema: "2.0"
  identity:
    name: "CravateRouge Ltd"
    type: organization
    description: Keep it tight with your security. At CravateRouge Ltd we provide cybersecurity services tailored to your needs.
    social:
      twitter: "rouge_cravate" 
  theme:
    mode: system
    pack: default
    colors:
      primary: red
      secondary: ""
      neutral: ""
  typography:
    font: sans
    size: md
  layout:
    radius: md
    spacing: comfortable
    avatar_shape: circle
  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    show_logo: true
    show_title: false
    theme_toggle: true
    language_switcher: false
    cta:
      enable: true
      text: "Contact Us"
      url: "contact/"
  footer:
    style: minimal
    language_switcher: true
  copyright:
    license:
      type: custom                          # cc | custom
      allow_derivatives: false
      share_alike: true
      allow_commercial: false
    notice: |
      © {year} {name}. All rights reserved.\
      CravateRouge Limited is a private limited company registered in Hong Kong SAR under the incorporation number 76292843.
  content:
    math:
      enable: false
  search:
    enable: true
  pro:
    hide_attribution: false
  analytics:
    google:
      measurement_id: "G-64YDD5310R"
